<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Deep-space chip body -->
  <rect x="2" y="2" width="60" height="60" rx="10" ry="10" fill="#00060E"/>
  <rect x="3" y="3" width="58" height="58" rx="9" ry="9" fill="none" stroke="#0c1a28" stroke-width="1.5"/>

  <!-- Top & bottom traces (cyber yellow) -->
  <g stroke="#FEE801" stroke-width="1.4" stroke-linecap="round">
    <line x1="23" y1="18" x2="23" y2="5"/>
    <line x1="30" y1="18" x2="30" y2="5"/>
    <line x1="37" y1="18" x2="37" y2="5"/>
    <line x1="44" y1="18" x2="44" y2="5"/>
    <line x1="23" y1="46" x2="23" y2="59"/>
    <line x1="30" y1="46" x2="30" y2="59"/>
    <line x1="37" y1="46" x2="37" y2="59"/>
    <line x1="44" y1="46" x2="44" y2="59"/>
  </g>

  <!-- Left & right traces (electric cyan) -->
  <g stroke="#54C1E6" stroke-width="1.4" stroke-linecap="round">
    <line x1="18" y1="23" x2="5" y2="23"/>
    <line x1="18" y1="30" x2="5" y2="30"/>
    <line x1="18" y1="37" x2="5" y2="37"/>
    <line x1="18" y1="44" x2="5" y2="44"/>
    <line x1="46" y1="23" x2="59" y2="23"/>
    <line x1="46" y1="30" x2="59" y2="30"/>
    <line x1="46" y1="37" x2="59" y2="37"/>
    <line x1="46" y1="44" x2="59" y2="44"/>
  </g>

  <!-- Pink contact pads at the corners of the die -->
  <g fill="#F50057">
    <circle cx="18" cy="18" r="1.6"/>
    <circle cx="46" cy="18" r="1.6"/>
    <circle cx="18" cy="46" r="1.6"/>
    <circle cx="46" cy="46" r="1.6"/>
  </g>

  <!-- Chip die outline -->
  <rect x="18" y="18" width="28" height="28" fill="none" stroke="#FEE801" stroke-width="1.6"/>

  <!-- K7 wordmark with cyan/pink RGB-split glitch -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700"
     font-style="italic" text-anchor="middle" dominant-baseline="central" letter-spacing="-1">
    <text x="30.6" y="32.8" fill="#54C1E6" opacity="0.85">K7</text>
    <text x="33.2" y="33.2" fill="#F50057" opacity="0.85">K7</text>
    <text x="32"   y="33"   fill="#FEE801">K7</text>
  </g>
</svg>
